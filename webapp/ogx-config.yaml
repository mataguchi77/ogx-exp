version: 2
distro_name: bedrock-agentcore-webapp
apis:
  - inference
  - tool_runtime
  - vector_io
  - files
  - file_processors
  - responses
providers:
  inference:
    - provider_id: ollama
      provider_type: remote::ollama
      config:
        base_url: ${env.OLLAMA_URL:=http://localhost:11434/v1}
  tool_runtime:
    - provider_id: model-context-protocol
      provider_type: remote::model-context-protocol
  vector_io:
    - provider_id: sqlite-vec
      provider_type: inline::sqlite-vec
      config:
        db_path: ${env.SQLITE_STORE_DIR:=~/.ogx/bedrock-agentcore-webapp}/sqlite_vec.db
        persistence:
          namespace: vector_io::sqlite_vec
          backend: kv_default
  files:
    - provider_id: builtin-files
      provider_type: inline::localfs
      config:
        storage_dir: ${env.SQLITE_STORE_DIR:=~/.ogx/bedrock-agentcore-webapp}/files
        metadata_store:
          table_name: files_metadata
          backend: sql_default
  file_processors:
    - provider_id: pypdf
      provider_type: inline::pypdf
  responses:
    - provider_id: builtin
      provider_type: inline::builtin
      config:
        persistence:
          agent_state:
            namespace: agents
            backend: kv_default
          responses:
            table_name: responses
            backend: sql_default
        vector_stores_config:
          chunk_retrieval_params:
            chunk_multiplier: 2
storage:
  backends:
    kv_default:
      type: kv_sqlite
      db_path: ${env.SQLITE_STORE_DIR:=~/.ogx/bedrock-agentcore-webapp}/kvstore.db
    sql_default:
      type: sql_sqlite
      db_path: ${env.SQLITE_STORE_DIR:=~/.ogx/bedrock-agentcore-webapp}/sql_store.db
  stores:
    metadata:
      namespace: registry
      backend: kv_default
    inference:
      table_name: inference_store
      backend: sql_default
    conversations:
      table_name: openai_conversations
      backend: sql_default
    prompts:
      namespace: prompts
      backend: kv_default
    connectors:
      namespace: connectors
      backend: kv_default
server:
  port: 8321
registered_resources:
  models:
  - metadata:
      embedding_dimension: ${env.EMBEDDING_DIMENSION:=1024}
    model_id: ollama/${env.EMBEDDING_MODEL:=mxbai-embed-large}
    provider_id: ollama
    provider_model_id: ${env.EMBEDDING_MODEL:=mxbai-embed-large}:latest
    model_type: embedding
